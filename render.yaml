services:
  # --- Backend API (Express) ---
  - type: web
    name: employee-lookup-api
    runtime: node
    region: oregon
    plan: free
    rootDir: artifacts/api-server
    buildCommand: cd ../.. && npm install -g pnpm && pnpm install && pnpm --filter "@workspace/db" run push && pnpm --filter "./artifacts/api-server" run build
    startCommand: node dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false   # paste manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false   # paste manually in Render dashboard

  # --- Frontend (React/Vite static site) ---
  - type: web
    name: employee-lookup-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: artifacts/employee-finder
    buildCommand: cd ../.. && npm install -g pnpm && pnpm install && pnpm --filter "./artifacts/employee-finder" run build
    staticPublishPath: dist/public
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: BASE_PATH
        value: /
      - key: VITE_API_BASE_URL
        sync: false   # set to your API service URL e.g. https://employee-lookup-api.onrender.com
