services:
  # --- Backend API (Express) ---
  - type: web
    name: employee-lookup-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm --filter "@workspace/db" run push && pnpm --filter "./artifacts/api-server" run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SKIP_INSTALL_DEPS
        value: "true"

  # --- Frontend (React/Vite static site) ---
  - type: web
    name: employee-lookup-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm --filter "./artifacts/employee-finder" run build
    staticPublishPath: artifacts/employee-finder/dist/public
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: SKIP_INSTALL_DEPS
        value: "true"
